<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>99 Nights in the Forest</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#020502;
    font-family:Courier New, monospace;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:20px;
    left:20px;
    color:#ff3333;
    font-size:24px;
    font-weight:bold;
}

#timer{
    position:absolute;
    top:60px;
    left:20px;
    color:white;
    font-size:18px;
}

#stamina{
    position:absolute;
    top:90px;
    left:20px;
    color:#00ccff;
    font-size:18px;
}

#ammo{
    position:absolute;
    top:120px;
    left:20px;
    color:#ffee66;
    font-size:18px;
}

#battery{
    position:absolute;
    top:150px;
    left:20px;
    color:#ffff88;
    font-size:18px;
}

#safeTimer{
    position:absolute;
    top:180px;
    left:20px;
    color:#66ffcc;
    font-size:18px;
}

#instructions{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7);
    color:white;
    padding:10px 20px;
    border-radius:5px;
}
</style>
</head>

<body>

<div id="ui">NIGHT 1 / 99</div>
<div id="timer">Time until Day: 30s</div>
<div id="stamina">Stamina: 100</div>
<div id="ammo">Darts: 5 / 5</div>
<div id="battery">Flashlight Battery: 100%</div>
<div id="safeTimer">Cabin Safety: 5s</div>

<div id="instructions">
WASD = Move |
SHIFT = Sprint |
Mouse = Aim |
Click = Shoot |
Cabin protects for 5 seconds
</div>

<canvas id="gameCanvas"></canvas>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

// ================= GAME =================

let currentNight = 1;
let isDaytime = false;
let timeRemaining = 30;
let gameOver = false;

// ================= PLAYER =================

const player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    size: 8,
    angle: 0,
    safeTimer: 5
};

// ================= INPUT =================

const keys = {};

const mouse = {
    x: canvas.width / 2,
    y: canvas.height / 2
};

// ================= STAMINA =================

let stamina = 100;
const MAX_STAMINA = 100;

// ================= FLASHLIGHT =================

let flashlightBattery = 100;
const MAX_BATTERY = 100;

const FLASHLIGHT_RANGE = 300;
const FLASHLIGHT_ANGLE_HALF = Math.PI / 6;

// ================= GUN =================

let darts = [];

let ammo = 5;
const MAX_AMMO = 5;

let reloading = false;

// ================= WORLD =================

const trees = [];
let monsters = [];

// ================= CABIN =================

const cabin = {
    x: 300,
    y: 300,
    width: 150,
    height: 150
};

// ================= WORLD =================

function generateWorld(){

    trees.length = 0;

    for(let i = 0; i < 120; i++){

        trees.push({
            x:(Math.random()-0.5)*3000,
            y:(Math.random()-0.5)*3000,
            radius:Math.random()*15+10
        });
    }

    spawnMonsters();
}

function spawnMonsters(){

    monsters = [];

    for(let i = 0; i < 20; i++){

        monsters.push({
            x:(Math.random()-0.5)*3000,
            y:(Math.random()-0.5)*3000,
            speed:1.2 + Math.random()*0.8
        });
    }
}

// ================= TIMER =================

setInterval(() => {

    if(gameOver) return;

    timeRemaining--;

    if(timeRemaining <= 0){

        isDaytime = !isDaytime;
        timeRemaining = 30;

        if(!isDaytime){

            currentNight++;

            spawnMonsters();

            document.getElementById("ui").innerText =
                "NIGHT " + currentNight + " / 99";

        }else{

            document.getElementById("ui").innerText =
                "DAYTIME - SAFE";
        }
    }

    document.getElementById("timer").innerText =
        `Time until ${isDaytime ? "Night" : "Day"}: ${timeRemaining}s`;

},1000);

// ================= INPUT =================

window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

window.addEventListener("mousemove", e => {

    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// ================= SHOOT =================

window.addEventListener("mousedown", () => {

    if(gameOver) return;
    if(isDaytime) return;
    if(reloading) return;

    if(ammo <= 0){

        startReload();
        return;
    }

    ammo--;

    darts.push({
        x:player.x,
        y:player.y,
        angle:player.angle,
        speed:12,
        life:100
    });

    if(ammo <= 0){
        startReload();
    }
});

function startReload(){

    if(reloading) return;

    reloading = true;

    document.getElementById("ammo").innerText =
        "Reloading...";

    setTimeout(() => {

        ammo = MAX_AMMO;
        reloading = false;

    },5000);
}

// ================= RESET =================

function resetGame(){

    gameOver = true;

    setTimeout(() => {

        alert("The creatures caught you!");

        currentNight = 1;
        isDaytime = false;
        timeRemaining = 30;

        stamina = 100;
        flashlightBattery = 100;
        ammo = 5;

        player.x = canvas.width / 2;
        player.y = canvas.height / 2;

        generateWorld();

        gameOver = false;

    },10);
}

// ================= UPDATE =================

function update(){

    if(gameOver) return;

    // ===== SPRINT =====

    let sprinting =
        keys["shift"] && stamina > 0;

    let speed =
        sprinting ? 5.5 : 3;

    if(sprinting){

        stamina -= 0.6;

    }else{

        stamina += 0.3;
    }

    stamina =
        Math.max(
            0,
            Math.min(MAX_STAMINA, stamina)
        );

    // ===== BATTERY =====

    if(!isDaytime){

        flashlightBattery -= 0.02;

    }else{

        flashlightBattery += 0.05;
    }

    flashlightBattery =
        Math.max(
            0,
            Math.min(MAX_BATTERY, flashlightBattery)
        );

    // ===== MOVEMENT =====

    let moveX = 0;
    let moveY = 0;

    if(keys["w"]) moveY -= speed;
    if(keys["s"]) moveY += speed;
    if(keys["a"]) moveX -= speed;
    if(keys["d"]) moveX += speed;

    player.x += moveX;
    player.y += moveY;

    player.angle =
        Math.atan2(
            mouse.y - canvas.height / 2,
            mouse.x - canvas.width / 2
        );

    // ===== CABIN TIMER =====

    let insideCabin =
        player.x > cabin.x &&
        player.x < cabin.x + cabin.width &&
        player.y > cabin.y &&
        player.y < cabin.y + cabin.height;

    if(insideCabin){

        player.safeTimer -= 1/60;

    }else{

        player.safeTimer = 5;
    }

    if(player.safeTimer < 0){

        player.safeTimer = 0;
    }

    let protectedByCabin =
        player.safeTimer > 0;

    // ===== DARTS =====

    for(let i = darts.length - 1; i >= 0; i--){

        let d = darts[i];

        d.x += Math.cos(d.angle) * d.speed;
        d.y += Math.sin(d.angle) * d.speed;

        d.life--;

        if(d.life <= 0){

            darts.splice(i,1);
            continue;
        }

        for(let j = monsters.length - 1; j >= 0; j--){

            let m = monsters[j];

            let dx = m.x - d.x;
            let dy = m.y - d.y;

            let dist =
                Math.sqrt(dx*dx + dy*dy);

            if(dist < 10){

                monsters.splice(j,1);
                darts.splice(i,1);

                break;
            }
        }
    }

    // ===== MONSTERS =====

    for(let m of monsters){

        let dx = m.x - player.x;
        let dy = m.y - player.y;

        let dist =
            Math.sqrt(dx*dx + dy*dy);

        // DIE ONLY IF NOT PROTECTED

        if(dist < player.size + 6 &&
           !protectedByCabin){

            resetGame();
            return;
        }

        // STOP MONSTERS INSIDE CABIN

        let monsterInsideCabin =
            m.x > cabin.x &&
            m.x < cabin.x + cabin.width &&
            m.y > cabin.y &&
            m.y < cabin.y + cabin.height;

        if(monsterInsideCabin){

            continue;
        }

        if(isDaytime) continue;

        let dynamicRange =
            FLASHLIGHT_RANGE *
            (flashlightBattery / 100);

        let isLit = false;

        if(dist < dynamicRange){

            let angleToMonster =
                Math.atan2(dy, dx);

            let angleDiff =
                angleToMonster - player.angle;

            while(angleDiff < -Math.PI)
                angleDiff += Math.PI * 2;

            while(angleDiff > Math.PI)
                angleDiff -= Math.PI * 2;

            if(Math.abs(angleDiff)
               < FLASHLIGHT_ANGLE_HALF){

                isLit = true;
            }
        }

        if(dist > 0){

            if(isLit){

                m.x +=
                    (dx / dist) *
                    (m.speed * 2.5);

                m.y +=
                    (dy / dist) *
                    (m.speed * 2.5);

            }else if(dist < 800){

                m.x -=
                    (dx / dist) *
                    m.speed;

                m.y -=
                    (dy / dist) *
                    m.speed;
            }
        }
    }

    // ===== UI =====

    document.getElementById("stamina").innerText =
        "Stamina: " +
        Math.floor(stamina);

    document.getElementById("ammo").innerText =
        reloading
        ? "Reloading..."
        : `Darts: ${ammo} / ${MAX_AMMO}`;

    document.getElementById("battery").innerText =
        "Flashlight Battery: " +
        Math.floor(flashlightBattery) +
        "%";

    document.getElementById("safeTimer").innerText =
        "Cabin Safety: " +
        player.safeTimer.toFixed(1) +
        "s";
}

// ================= DRAW =================

function draw(){

    ctx.fillStyle =
        isDaytime
        ? "#1a2b1a"
        : "#020502";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.save();

    ctx.translate(
        canvas.width / 2 - player.x,
        canvas.height / 2 - player.y
    );

    // ===== FLASHLIGHT =====

    if(!isDaytime){

        let dynamicRange =
            FLASHLIGHT_RANGE *
            (flashlightBattery / 100);

        ctx.beginPath();

        ctx.moveTo(player.x, player.y);

        ctx.arc(
            player.x,
            player.y,
            dynamicRange,
            player.angle - FLASHLIGHT_ANGLE_HALF,
            player.angle + FLASHLIGHT_ANGLE_HALF
        );

        ctx.closePath();

        let gradient =
            ctx.createRadialGradient(
                player.x,
                player.y,
                10,
                player.x,
                player.y,
                dynamicRange
            );

        gradient.addColorStop(
            0,
            "rgba(255,255,210,0.4)"
        );

        gradient.addColorStop(
            1,
            "rgba(255,255,210,0)"
        );

        ctx.fillStyle = gradient;
        ctx.fill();
    }

    // ===== TREES =====

    for(let tree of trees){

        ctx.beginPath();

        ctx.arc(
            tree.x,
            tree.y,
            tree.radius,
            0,
            Math.PI * 2
        );

        ctx.fillStyle =
            isDaytime
            ? "#2d4a2d"
            : "#142414";

        ctx.fill();
    }

    // ===== CABIN =====

    ctx.fillStyle = "#5a3a1a";

    ctx.fillRect(
        cabin.x,
        cabin.y,
        cabin.width,
        cabin.height
    );

    // ===== DARTS =====

    for(let d of darts){

        ctx.beginPath();

        ctx.arc(
            d.x,
            d.y,
            3,
            0,
            Math.PI * 2
        );

        ctx.fillStyle = "#66ccff";

        ctx.fill();
    }

    // ===== MONSTERS =====

    for(let m of monsters){

        ctx.fillStyle = "#ff1111";

        ctx.beginPath();
        ctx.arc(m.x - 3, m.y, 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(m.x + 3, m.y, 2, 0, Math.PI * 2);
        ctx.fill();
    }

    // ===== PLAYER =====

    ctx.beginPath();

    ctx.arc(
        player.x,
        player.y,
        player.size,
        0,
        Math.PI * 2
    );

    ctx.fillStyle = "white";
    ctx.fill();

    ctx.restore();
}

// ================= LOOP =================

function loop(){

    update();
    draw();

    requestAnimationFrame(loop);
}

generateWorld();
loop();

</script>
</body>
</html>

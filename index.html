<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☠️Survive💀</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e1e2f, #2c3e50);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .container {
        max-width: 600px;
        padding: 20px;
    }

    h1 {
        font-size: 48px;
        margin-bottom: 10px;
    }

    p {
        font-size: 18px;
        margin-bottom: 30px;
        color: #ddd;
    }

    .btn {
        display: inline-block;
        padding: 15px 35px;
        font-size: 20px;
        background: #00c853;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        transition: 0.2s;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .btn:hover {
        background: #00e676;
        transform: scale(1.05);
    }

    .instructions {
        margin-top: 25px;
        font-size: 16px;
        color: #bbb;
    }
</style>

</head>

<body>

<div class="container">
    <h1>Survive</h1>

    <p>Survive, explore, and defeat enemies. Good luck!</p>

    <a class="btn" href="game.html" target="_blank">
        ▶ Play
    </a>

    <div class="instructions">
        <p><b>Instructions:</b></p>
        <p>WASD = Move</p>
        <p>Mouse = Aim</p>
        <p>Click = Shoot</p>
    </div>
</div>

</body>
</html>
